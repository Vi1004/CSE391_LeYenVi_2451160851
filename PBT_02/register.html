<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản E-Commerce</title>
</head>

<body>
    <h1>Đăng ký tài khoản</h1>
    <form action="#" method="POST"
        <!--Fieldset 1-->
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <p>
                <label for="fullname">Họ tên:</label>
                <input type="text" id="fullname" name="fullname" 
                    placeholder="Nhập họ tên" required minlength="2" maxlength="50">
            </p>
            
            <p>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" 
                    placeholder="example@gmail.com" required>
            </p>
            
            <p>
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone" 
                    placeholder="0912345678" pattern="[0-9]{10}" required>
            </p>
            
            <p>
                <label for="dob">Ngày sinh</label>
                <input type="date" id="dob" name="dob" max="2026-04-30" required>
            </p>
            
        </fieldset>

        <!--Fieldset 2-->
        <fieldset>
            <legend>Tài khoản</legend>
            <p>
                <label for="username">Tên đăng nhâp:</label>
                <input type="text" id="username" name="username"
                    placeholder="3-20 ký tự"
                    pattern="^[a-zA-Z0-9_]{3,20}$" required>
            </p>

            <p>
                <label for="password">Mật khẩu:</label>
                <input type="password" id="password" name="password"
                    placeholder="ít nhất 8 ký tự, 1 chữ hoa, 1 số"
                    minlength="8" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" required>
            </p>

            <p>
                <label for="confirm_password">Xác nhận mật khẩu:</label>
                <input type="password" id="confirm_password" name="confirm_password"
                    placeholder="Nhập lại mật khẩu" required minlength="8" pattern ="(?=.*[A-Z])(?=.*[0-9]).{8,}">
            </p>

        </fieldset>

        <!--Fieldset 3-->
        <fieldset>
            <legend>Thông tin giao hàng</legend>
            <p>
                <label for="city">Thành phố:</label>
                <select id="city" name="city" required>
                    <option value="">-- Chọn thành phố --</option>
                    <option>Hà Nội</option>
                    <option>TP.Hồ Chí Minh</option>
                    <option>Nghệ An</option>
                    <option>Đà Nẵng</option>
                    <option>Nha Trang</option>
            </p>

            <p>
                <label for="district">Quận/Huyện</label>
                <select id="district" name="district" required>
                    <option value="">-- Chọn quận/huyện --</option>
                    <option>Đống Đa</option>
                    <option>Hai Bà Trưng</option>
                    <option>Cầu Giấy</option>
                </select>
            </p>

            <p>
                <label for="address">Địa chỉ chi tiết</label>
                <textarea id="address" name="address" rows="3"
                    placeholder="Số nhà, tên đường, phường/xã" required></textarea>
            </p>

            <p>
                Giới tính:
                <label><input type="radio" name="gender" value="male"> Nam/label>
                <label><input type="radio" name="gender" value="female"> Nữ</label>
                <label><input type="radio" name="gender" value="other"> Khác</label>
            </p>

            <!--Checkbox-->
            <p>
                <label><input type="checkbox" name="terms" required>Tôi đồng ý điều khoản</label>
            </p>
        </fieldset>

        <!--Button-->
        <div class="button-group">
            <button type="submit">Đăng ký tài khoản</button>
            <button type="reset">Nhập lại</button>
        </div>
    </form>
</body>
</html>
